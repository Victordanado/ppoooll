<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>

    <style>
    /* Resetando estilos padrão */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* Estilos para o body e o layout geral */
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .form-container {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    /* Estilos para os campos do formulário */
    .input-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }

    input[type="text"], input[type="email"], input[type="tel"], input[type="date"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        color: #333;
    }

    input:focus {
        border-color: #007BFF;
        outline: none;
    }

    /* Estilo para os botões */
    .btn-submit, .btn-continuar {
        background-color: #007BFF;
        color: #fff;
        border: none;
        padding: 10px 15px;
        font-size: 16px;
        width: 100%;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    .btn-submit:hover, .btn-continuar:hover {
        background-color: #0056b3;
    }

    #btnContinuar {
        margin-top: 10px;
        background-color: #28a745;
    }
    </style>

</head>

<body>

<div class="form-container">
    <h2>Cadastro de Cliente</h2>

    <form id="formCadastro">

        <div class="input-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" required>
        </div>

        <div class="input-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" required>
        </div>

        <div class="input-group">
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" required>
        </div>

        <div class="input-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" required>
        </div>

        <button type="submit" class="btn-submit">Cadastrar</button>

    </form>

    <button id="btnContinuar" class="btn-continuar">Continuar</button>

</div>

<script>
// Função para salvar os dados do formulário no localStorage
document.getElementById('formCadastro').addEventListener('submit', function(event) {
    event.preventDefault();

    const nome = document.getElementById('nome').value;
    const email = document.getElementById('email').value;
    const telefone = document.getElementById('telefone').value;
    const endereco = document.getElementById('endereco').value;
    const dataNascimento = document.getElementById('data_nascimento').value;

    const cliente = {
        nome: nome,
        email: email,
        telefone: telefone,
        endereco: endereco,
        dataNascimento: dataNascimento
    };

    let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
    clientes.push(cliente);
    localStorage.setItem('clientes', JSON.stringify(clientes));

    document.getElementById('formCadastro').reset();

    alert('Cadastro realizado com sucesso!');
});

// Redirecionar
document.getElementById('btnContinuar').addEventListener('click', function() {
    window.location.href = 'pagina-inicial.html';
});
</script>

</body>
</html>
