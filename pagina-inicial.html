<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banco Virtual</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topo">
<h1>💰 Banco Virtual</h1>
<button>Nova Transação</button>
</header>

<div class="cards">

<div class="card">
<p>Entradas</p>
<h2>R$ 14.500,00</h2>
</div>

<div class="card vermelho">
<p>Saídas</p>
<h2>- R$ 1.680,00</h2>
</div>

<div class="card verde">
<p>Total</p>
<h2>R$ 12.820,00</h2>
</div>

</div>

<div class="tabela">

<table>

<thead>
<tr>
<th>Título</th>
<th>Valor</th>
<th>Categoria</th>
<th>Data</th>
</tr>
</thead>

<tbody>

<tr>
<td>Dev 30h Job</td>
<td class="verde">+ R$10.000</td>
<td>Venda</td>
<td>12/05/2022</td>
</tr>

<tr>
<td>Dev Web Harry</td>
<td class="verde">+ R$4.500</td>
<td>Venda</td>
<td>13/05/2022</td>
</tr>

<tr>
<td>Aluguel</td>
<td class="vermelho">- R$1.400</td>
<td>Casa</td>
<td>14/05/2022</td>
</tr>

<tr>
<td>Luz</td>
<td class="vermelho">- R$280</td>
<td>Casa</td>
<td>15/05/2022</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
