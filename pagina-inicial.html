<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>

    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f9;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
    }

    .form-container {
        background-color: #fff;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 500px;
    }

    h2 {
        text-align: center;
        color: #333;
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
        color: #555;
    }

    input[type="text"], input[type="email"], input[type="tel"], input[type="date"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
        color: #333;
    }

    input.erro {
        border-color: red;
    }

    input:focus {
        border-color: #007BFF;
        outline: none;
    }

    .btn-submit, .btn-continuar {
        background-color: #007BFF;
        color: #fff;
        border: none;
        padding: 10px 15px;
        font-size: 16px;
        width: 100%;
        cursor: pointer;
        border-radius: 5px;
        transition: background-color 0.3s ease;
    }

    .btn-submit:hover, .btn-continuar:hover {
        background-color: #0056b3;
    }

    #btnContinuar {
        margin-top: 10px;
        background-color: #28a745;
    }
    </style>

</head>

<body>

<div class="form-container">
    <h2>Cadastro de Cliente</h2>

    <form id="formCadastro">

        <div class="input-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" required>
        </div>

        <div class="input-group">
            <label for="email">E-mail:</label>
            <input type="email" id="email" required>
        </div>

        <div class="input-group">
            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" required>
        </div>

        <div class="input-group">
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" required>
        </div>

        <div class="input-group">
            <label for="data_nascimento">Data de Nascimento:</label>
            <input type="date" id="data_nascimento" required>
        </div>

        <button type="submit" class="btn-submit">Cadastrar</button>

    </form>

    <button id="btnContinuar" class="btn-continuar">Continuar</button>

</div>

<script>

let cadastroFeito = false;

// Máscara de telefone simples
document.getElementById('telefone').addEventListener('input', function(e){
    let v = e.target.value.replace(/\D/g, '');
    v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
    v = v.replace(/(\d{5})(\d)/, "$1-$2");
    e.target.value = v;
});

// Função para salvar os dados
document.getElementById('formCadastro').addEventListener('submit', function(event) {
    event.preventDefault();

    const nome = document.getElementById('nome');
    const email = document.getElementById('email');
    const telefone = document.getElementById('telefone');
    const endereco = document.getElementById('endereco');
    const dataNascimento = document.getElementById('data_nascimento');

    // reset erro
    [nome, email, telefone, endereco, dataNascimento].forEach(i => i.classList.remove('erro'));

    // validação
    if (
        nome.value.trim() === "" ||
        email.value.trim() === "" ||
        telefone.value.trim() === "" ||
        endereco.value.trim() === "" ||
        dataNascimento.value === ""
    ) {
        [nome, email, telefone, endereco, dataNascimento].forEach(i => {
            if(!i.value.trim()) i.classList.add('erro');
        });

        alert("Preencha todos os campos!");
        return;
    }

    // valida email simples
    if (!email.value.includes("@")) {
        email.classList.add('erro');
        alert("Email inválido!");
        return;
    }

    const cliente = {
        nome: nome.value.trim(),
        email: email.value.trim(),
        telefone: telefone.value.trim(),
        endereco: endereco.value.trim(),
        dataNascimento: dataNascimento.value
    };

    try {
        let clientes = JSON.parse(localStorage.getItem('clientes')) || [];
        clientes.push(cliente);
        localStorage.setItem('clientes', JSON.stringify(clientes));
    } catch(e) {
        alert("Erro ao salvar dados!");
        return;
    }

    document.getElementById('formCadastro').reset();

    cadastroFeito = true;

    alert('Cadastro realizado com sucesso!');
});

// Redirecionar
document.getElementById('btnContinuar').addEventListener('click', function() {
    if (!cadastroFeito) {
        alert("Cadastre um cliente primeiro!");
        return;
    }

    window.location.href = 'pagina-inicial.html';
});

</script>

</body>
</html>
