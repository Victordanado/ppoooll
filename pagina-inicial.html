<!DOCTYPE html>
<html lang="pt-BR">
<head>

<title>Banco Virtual</title>

<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="topo">
<h1>Banco Virtual</h1>
</div>

<div class="cartao">

<p class="tituloSaldo">Saldo disponível</p>

<h2 class="saldo">R$ <span id="saldo">2500</span></h2>

</div>

<div class="acoes">

<input type="number" id="valor" placeholder="Digite o valor">

<button class="depositar" onclick="depositar()">Depositar</button>

<button class="debitar" onclick="debitar()">Debitar</button>

<button class="transferir" onclick="transferir()">Transferir</button>

</div>

<div class="historicoBox">

<h3>Histórico</h3>

<div id="historico"></div>

</div>

<script src="script.js"></script>

</body>
</html>
