<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Banco Virtual</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<h1>🏦 Banco Virtual</h1>

<div class="cartao">

<p>Saldo disponível</p>

<h2 id="saldo">R$ 2.500</h2>

</div>

<div class="acoes">

<button>
<img src="https://img.icons8.com/ios-filled/50/ffffff/money.png">
Depositar
</button>

<button>
<img src="https://img.icons8.com/ios-filled/50/ffffff/send-money.png">
Transferir
</button>

<button>
<img src="https://img.icons8.com/ios-filled/50/ffffff/bank-card-back-side.png">
Cartão
</button>

<button>
<img src="https://img.icons8.com/ios-filled/50/ffffff/receipt.png">
Extrato
</button>

</div>

<div class="graficoArea">

<h3>Gastos do mês</h3>

<canvas id="grafico"></canvas>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
