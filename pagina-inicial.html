<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banco Virtual</title>

<!-- CHART -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* BODY */
body{
font-family:Arial;
background:#f2f2f2;
}

/* TOPO */
.topo{
background:#6d28d9;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.topo button{
background:#22c55e;
border:none;
padding:10px 20px;
color:white;
border-radius:6px;
cursor:pointer;
}

/* CARDS */
.cards{
display:flex;
gap:20px;
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
flex:1;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card.verde{
background:#10b981;
color:white;
}

.card.vermelho{
background:#ef4444;
color:white;
}

/* TABELA */
.tabela{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:15px;
text-align:left;
}

thead{
background:#e5e7eb;
}

tbody tr{
border-bottom:1px solid #ddd;
}

.verde{
color:#10b981;
font-weight:bold;
}

.vermelho{
color:#ef4444;
font-weight:bold;
}

/* GRAFICO */
.graficoArea{
padding:30px;
}

canvas{
max-width:400px;
margin:auto;
display:block;
}

</style>

</head>

<body>

<header class="topo">
<h1>💰 Banco Virtual</h1>
<button>Nova Transação</button>
</header>

<div class="cards">

<div class="card">
<p>Entradas</p>
<h2>R$ 14.500,00</h2>
</div>

<div class="card vermelho">
<p>Saídas</p>
<h2>- R$ 1.680,00</h2>
</div>

<div class="card verde">
<p>Total</p>
<h2>R$ 12.820,00</h2>
</div>

</div>

<div class="tabela">

<table>

<thead>
<tr>
<th>Título</th>
<th>Valor</th>
<th>Categoria</th>
<th>Data</th>
</tr>
</thead>

<tbody>

<tr>
<td>Dev 30h Job</td>
<td class="verde">+ R$10.000</td>
<td>Venda</td>
<td>12/05/2022</td>
</tr>

<tr>
<td>Dev Web Harry</td>
<td class="verde">+ R$4.500</td>
<td>Venda</td>
<td>13/05/2022</td>
</tr>

<tr>
<td>Aluguel</td>
<td class="vermelho">- R$1.400</td>
<td>Casa</td>
<td>14/05/2022</td>
</tr>

<tr>
<td>Luz</td>
<td class="vermelho">- R$280</td>
<td>Casa</td>
<td>15/05/2022</td>
</tr>

</tbody>

</table>

</div>

<!-- GRAFICO -->
<div class="graficoArea">
<canvas id="grafico"></canvas>
</div>

<script>

/* GRAFICO */
const ctx = document.getElementById('grafico');

new Chart(ctx, {
type: 'doughnut',

data: {
labels: ['Comida', 'Compras', 'Transporte', 'Outros'],

datasets: [{
data: [400, 300, 150, 100],
backgroundColor: [
'#9333ea',
'#3b82f6',
'#22c55e',
'#ef4444'
]
}]
},

options: {
plugins:{
legend:{
labels:{
color:"black"
}
}
}
}
});

</script>

</body>
</html>
